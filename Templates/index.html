{% extends 'base.html' %}

{% block head %}
<title>Fake news</title>
{% endblock %}

{% block body %}
<div class = "content">
   <h1 style="text-align: center"> Article - News </h1>
    <table>
        <tr>
            <th>Titre</th>
            <th>Date d'ajout</th>
            <th>Actions</th>
        </tr>
        {% for article in articles %}
            <tr>
                <td style=" height: 50px; width: 1000px; ">{{ article.title }}</td>
                <td style="text-align: center;">{{ article.date_created.date() }}</td>
                <td style=" height: 50px; width: 280px; text-align: center;">
                    <a href="/update/{{article.id}}">Modifier</a>
                    <a href="/delete/{{article.id}}">Effacer</a>
                    <a href="/view/{{article.id}}">Voir</a>
                </td>
            </tr>
        {% endfor %}
    </table>
    <button>
        <a href="/post/">new</a>
    </button>
</div>
{% endblock %}
